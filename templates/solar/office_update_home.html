{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <!-- Header -->
            <div class="d-flex align-items-center mb-4">
                <h2 class="fw-bold text-gradient mb-0">
                    <i class="bi bi-pencil-square text-primary me-2"></i>Update Project Status
                </h2>
            </div>

            <!-- Phone Lookup Card -->
            <div class="card glass-card border-0 shadow mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-search me-2"></i>Find Customer by Phone Number</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-8">
                            <label for="phone_input" class="form-label fw-bold">Mobile Number (10 Digits)</label>
                            <input type="text" id="phone_input" class="form-control form-control-lg"
                                placeholder="Enter customer's phone number" maxlength="10" pattern="\d{10}"
                                oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        </div>
                        <div class="col-md-4">
                            <button type="button" class="btn btn-premium btn-lg w-100 shadow"
                                onclick="searchCustomer()">
                                <i class="bi bi-download me-2"></i>Fetch Customer
                            </button>
                        </div>
                    </div>
                    <div id="status_msg" class="mt-3"></div>

                    <!-- Multiple Record Selection -->
                    <div id="record_selection" class="mt-4" style="display:none;">
                        <h6 class="fw-bold text-primary mb-3">Multiple Applications Found - Select One:</h6>
                        <div id="record_list" class="list-group mb-3"></div>
                        <button type="button" class="btn btn-success" onclick="goToSelected()" disabled
                            id="confirm_btn">
                            <i class="bi bi-check-circle me-2"></i>Open Update Form
                        </button>
                    </div>
                </div>
            </div>

            <!-- Customer Preview Card (shown after single result) -->
            <div id="customer_preview" class="card glass-card border-0 shadow" style="display:none;">
                <div class="card-header bg-transparent border-bottom">
                    <h5 class="mb-0 fw-bold text-dark">
                        <i class="bi bi-info-circle-fill text-primary me-2"></i>Customer Found
                    </h5>
                </div>
                <div class="card-body">
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="small text-muted text-uppercase fw-bold">Customer Name</label>
                            <input type="text" id="preview_name" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-4">
                            <label class="small text-muted text-uppercase fw-bold">SC Number</label>
                            <input type="text" id="preview_sc" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-4">
                            <label class="small text-muted text-uppercase fw-bold">Phase</label>
                            <input type="text" id="preview_phase" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-4">
                            <label class="small text-muted text-uppercase fw-bold">Area</label>
                            <input type="text" id="preview_area" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-4">
                            <label class="small text-muted text-uppercase fw-bold">Agreed Amount</label>
                            <input type="text" id="preview_amount" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-4">
                            <label class="small text-muted text-uppercase fw-bold">Install Status</label>
                            <input type="text" id="preview_status" class="form-control bg-light" readonly>
                        </div>
                    </div>
                    <a id="update_btn" href="#" class="btn btn-primary btn-lg w-100 fw-bold shadow">
                        <i class="bi bi-pencil-square me-2"></i>Open Update Form
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    let selectedId = null;

    function searchCustomer() {
        const phone = document.getElementById('phone_input').value.trim();
        const statusDiv = document.getElementById('status_msg');
        const previewDiv = document.getElementById('customer_preview');
        const selectionDiv = document.getElementById('record_selection');

        // Reset
        previewDiv.style.display = 'none';
        selectionDiv.style.display = 'none';
        selectedId = null;

        if (!phone || phone.length !== 10) {
            statusDiv.innerHTML = '<div class="alert alert-warning">Please enter a valid 10-digit phone number.</div>';
            return;
        }

        statusDiv.innerHTML = '<div class="alert alert-info"><i class="bi bi-hourglass-split me-2"></i>Searching...</div>';

        fetch(`/api/get-survey-by-phone-all/?phone=${phone}`)
            .then(r => r.json())
            .then(data => {
                if (!data.found) {
                    statusDiv.innerHTML = `<div class="alert alert-danger"><i class="bi bi-x-circle-fill me-2"></i>${data.message}</div>`;
                    return;
                }

                if (data.count === 1) {
                    statusDiv.innerHTML = '<div class="alert alert-success"><i class="bi bi-check-circle-fill me-2"></i>Customer found! Review details below and click "Open Update Form".</div>';
                    showPreview(data);
                } else {
                    statusDiv.innerHTML = `<div class="alert alert-info"><i class="bi bi-list-ul me-2"></i>Found ${data.count} applications. Please select one.</div>`;
                    showRecordList(data.records);
                }
            })
            .catch(() => {
                statusDiv.innerHTML = '<div class="alert alert-danger">Error fetching customer details.</div>';
            });
    }

    function showPreview(data) {
        selectedId = data.survey_id;
        document.getElementById('preview_name').value = data.customer_name;
        document.getElementById('preview_sc').value = data.sc_no;
        document.getElementById('preview_phase').value = data.phase;
        document.getElementById('preview_area').value = data.area || '-';
        document.getElementById('preview_amount').value = '₹ ' + data.agreed_amount;
        document.getElementById('preview_status').value = data.workflow_status;
        document.getElementById('update_btn').href = `/office/update-status/${data.survey_id}/`;
        document.getElementById('customer_preview').style.display = 'block';
    }

    function showRecordList(records) {
        const list = document.getElementById('record_list');
        list.innerHTML = '';
        records.forEach(r => {
            const item = document.createElement('div');
            item.className = 'list-group-item list-group-item-action';
            item.innerHTML = `
                <div class="d-flex w-100 align-items-center">
                    <input type="radio" name="sel_survey" value="${r.id}" id="s_${r.id}"
                        class="form-check-input me-3" onchange="enableConfirm(${r.id})">
                    <label for="s_${r.id}" class="flex-grow-1 mb-0" style="cursor:pointer;">
                        <div class="row g-2">
                            <div class="col-md-3"><strong>${r.customer_name}</strong></div>
                            <div class="col-md-3"><small class="text-muted">SC: ${r.sc_no.slice(0, 10)}...</small></div>
                            <div class="col-md-2"><span class="badge bg-primary">${r.phase}</span></div>
                            <div class="col-md-2"><span class="badge ${r.workflow_status === 'Completed' ? 'bg-success' : 'bg-warning text-dark'}">${r.workflow_status}</span></div>
                            <div class="col-md-2"><small class="text-muted">${r.created_at}</small></div>
                        </div>
                    </label>
                </div>`;
            list.appendChild(item);
        });
        document.getElementById('record_selection').style.display = 'block';
    }

    function enableConfirm(id) {
        selectedId = id;
        document.getElementById('confirm_btn').disabled = false;
    }

    function goToSelected() {
        if (selectedId) {
            window.location.href = `/office/update-status/${selectedId}/`;
        }
    }

    // Allow Enter key to trigger search
    document.getElementById('phone_input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') searchCustomer();
    });
</script>
{% endblock %}
