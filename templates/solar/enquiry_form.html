{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container d-flex flex-column align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card glass-card shadow-lg" style="max-width: 500px; width: 100%;">
        <div class="card-header text-center py-4 border-0">
            <h2 class="mb-0 text-gradient">Enquiry Form</h2>
            <p class="text-muted small">We'll get back to you as soon as possible.</p>
        </div>
        <div class="card-body p-4 pt-0">
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show d-flex align-items-center shadow-sm"
                role="alert">
                <i
                    class="bi {% if message.tags == 'error' %}bi-exclamation-triangle-fill{% else %}bi-check-circle-fill{% endif %} me-2 fs-5"></i>
                <div class="fw-medium">
                    {{ message }}
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
            {% endif %}

            <form action="{% url 'create_enquiry' %}" method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_name" class="form-label fw-bold text-uppercase small text-muted">Full Name <span
                            class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control shadow-sm" id="id_name" required>
                </div>
                <div class="mb-3">
                    <label for="id_mobile_number" class="form-label fw-bold text-uppercase small text-muted">Mobile
                        Number <span class="text-danger">*</span></label>
                    <input type="text" name="mobile_number" class="form-control shadow-sm" id="id_mobile_number"
                        required>
                </div>
                <div class="mb-3">
                    <label for="id_email" class="form-label fw-bold text-uppercase small text-muted">Email Address <span
                            class="text-danger">*</span></label>
                    <input type="email" name="email" class="form-control shadow-sm" id="id_email" required>
                </div>
                <div class="mb-3">
                    <label for="id_address" class="form-label fw-bold text-uppercase small text-muted">Address <span
                            class="text-danger">*</span></label>
                    <textarea name="address" class="form-control shadow-sm" id="id_address" rows="3"
                        required></textarea>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-premium btn-lg">Submit Enquiry</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
