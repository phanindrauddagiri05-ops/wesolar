<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeSolar — Under Maintenance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        /* Animated background orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: #f5a623;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: #00d2ff;
            bottom: -100px;
            right: -100px;
            animation-delay: 3s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: #a8edea;
            top: 50%;
            left: 50%;
            animation-delay: 6s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        .maintenance-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 60px 50px;
            text-align: center;
            max-width: 560px;
            width: 90%;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
        }

        .gear-icon {
            font-size: 5rem;
            color: #f5a623;
            display: block;
            margin-bottom: 8px;
            animation: spin-slow 6s linear infinite;
        }

        @keyframes spin-slow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .logo-text span {
            color: #f5a623;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            margin: 24px 0 12px;
        }

        p {
            color: rgba(255, 255, 255, 0.65);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 36px;
        }

        .status-bar {
            background: rgba(245, 166, 35, 0.1);
            border: 1px solid rgba(245, 166, 35, 0.3);
            border-radius: 50px;
            padding: 10px 24px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #f5a623;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: #f5a623;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.7);
            }
        }

        .footer-text {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <!-- Background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="maintenance-card">
        <i class="bi bi-gear-wide-connected gear-icon"></i>

        <div class="logo-text">We<span>Solar</span></div>

        <h1>We'll be back soon!</h1>

        <p>
            Our platform is currently undergoing scheduled maintenance to bring you an even better experience.
            We apologize for the inconvenience and appreciate your patience.
        </p>

        <div class="status-bar">
            <div class="pulse-dot"></div>
            Maintenance in progress...
        </div>

        <div class="footer-text">
            &copy; {% now "Y" %} WeSolar Inc. &mdash; Powering the Future
        </div>
    </div>
</body>

</html>
